name: DigiTrain Vibe Coding
version: 1.0.0
schema: v1

models:
  - name: Qwen3 Coder - Standard
    provider: openrouter
    model: qwen/qwen3-coder
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 64000
      maxTokens: 1800

  - name: GPT-5 Codex - Debug
    provider: openrouter
    model: openai/gpt-5-codex
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 100000
      maxTokens: 2500
